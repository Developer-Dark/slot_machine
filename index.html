<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Slot Machine</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="top-bar">
      <div class="top-item id-row">
        <span class="id-label">ID</span>
        <strong id="playerIdText"></strong>
        <button class="copy-btn" id="copyBtn">복사</button>
      </div>
      <div class="top-item">
        남은 스핀 : <span id="spinCountText">-</span>
      </div>
    </div>

    <div class="card main" id="main-card">
      <h2 id="result">슬롯 머신</h2>
      <div class="slots">
        <div class="slot"><div class="reel" id="reel1"></div></div>
        <div class="slot"><div class="reel" id="reel2"></div></div>
        <div class="slot"><div class="reel" id="reel3"></div></div>
      </div>
      <div class="button-group">
        <button id="spin-btn" disabled>데이터 불러오는 중...</button>
        <button id="history-btn">기록</button>
      </div>
    </div>

    <div class="stats-card">
      <div class="stats-header">세션 환수율 통계</div>
      <div class="stats-grid">
        <div class="stat-item">
          <span class="label">예상 환수율</span>
          <span class="value">92%</span>
        </div>
        <div class="stat-item">
          <span class="label">실제 환수율</span>
          <span class="value" id="actualRtp">0%</span>
        </div>
        <div class="stat-item">
          <span class="label">환수율 오차</span>
          <span class="value" id="rtpDiff">0%</span>
        </div>
      </div>
      <div class="prob-list" id="probList"></div>
    </div>
  </div>

  <div id="historyModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">기록</div>
      <div class="history" id="history"></div>
      <button id="closeHistory" class="modal-close-btn">닫기</button>
    </div>
  </div>

  <div id="flash" class="flash"></div>

  <script src="script.js"></script>
</body>
</html>
