<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CRYPTO SLOT SIMULATOR</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="win-overlay" class="win-overlay"></div>

  <div class="app">
    <header class="wallet-bar">
      <div class="balance-info">
        <span class="label">MY BALANCE</span>
        <strong id="balanceText">0.00</strong> <span class="unit">CREDIT</span>
      </div>
      <div class="id-info">
        <span id="playerIdText"></span>
      </div>
    </header>

    <div class="card main-card" id="main-card">
      <div id="status-tag">SYSTEM READY</div>
      <div class="slots">
        <div class="slot"><div class="reel" id="reel1"></div></div>
        <div class="slot"><div class="reel" id="reel2"></div></div>
        <div class="slot"><div class="reel" id="reel3"></div></div>
      </div>
      
      <div class="bet-control">
        <div class="bet-info">
          <span class="label">SPIN COST</span>
          <strong>1.00 CREDIT</strong>
        </div>
        <button id="spin-btn" disabled>LOADING...</button>
      </div>
    </div>

    <div class="card stats-card">
      <div class="stats-top">
        <h3>TRADE HISTORY</h3>
        <button id="history-btn" class="text-btn">LOGS</button>
      </div>
      <div class="stats-box">
        <div class="stat"><span class="label">REMAINING SPINS</span> <b id="spinCountText">0</b></div>
        <div class="stat"><span class="label">WIN RATE</span> <b id="actualRtp">0%</b></div>
      </div>
    </div>
    <button id="copyBtn" class="id-copy-btn">COPY WALLET ID</button>
  </div>

  <div id="historyModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>TRANSACTION LOG</h2>
        <button id="closeHistory" class="close-btn">&times;</button>
      </div>
      <div id="history" class="history-list"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
