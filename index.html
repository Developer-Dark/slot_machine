<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SLOT SIMULATOR</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="status-bar">
      <div class="id-tag">ID: <span id="playerIdText">---</span></div>
      <div class="rtp-tag">RTP: <span id="actualRtpText">0%</span></div>
    </div>

    <div class="main-card">
      <div class="info-row">
        <span class="label">REMAINING SPINS</span>
        <strong id="spinCountText">0</strong>
      </div>

      <div class="slot-area">
        <div class="slot"><div class="reel" id="reel1"></div></div>
        <div class="slot"><div class="reel" id="reel2"></div></div>
        <div class="slot"><div class="reel" id="reel3"></div></div>
      </div>

      <button id="spin-btn" disabled>CONNECTING...</button>
    </div>

    <div class="action-bar">
      <button id="history-btn">LOGS</button>
      <button id="copyBtn">COPY ID</button>
    </div>
  </div>

  <div id="historyModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <span>HISTORY</span>
        <button id="closeHistory">&times;</button>
      </div>
      <div id="history" class="history-list"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
