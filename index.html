<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>🎰 Premium Slot Simulator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="machine-header">SYSTEM ONLINE</div>

    <div class="card main" id="main-card">
      <h2 id="result">슬롯 머신</h2>
      <div class="slots">
        <div class="slot"><div class="reel" id="reel1"></div></div>
        <div class="slot"><div class="reel" id="reel2"></div></div>
        <div class="slot"><div class="reel" id="reel3"></div></div>
      </div>
      
      <div class="button-group">
        <button id="spin-btn" class="toss-btn" disabled>데이터 불러오는 중...</button>
      </div>
    </div>

    <div class="stats-area">
      <div class="info-bar">
        <div class="info-item id-section">
          <span class="label">USER IDENTIFIER</span>
          <div class="id-wrapper">
            <strong id="playerIdText">---</strong>
            <button id="copyBtn" class="copy-action-btn">복사</button>
          </div>
        </div>
        <div class="info-item spin-section">
          <span class="label">SPINS</span>
          <strong id="spinCountText">-</strong>
        </div>
      </div>

      <div class="stats-card">
        <div class="stats-header">RTP 분석 통계</div>
        <div class="stats-grid">
          <div class="stat-item">
            <span class="label">기대 RTP</span>
            <span class="value">92.0%</span>
          </div>
          <div class="stat-item">
            <span class="label">현재 RTP</span>
            <span class="value active" id="actualRtp">0.0%</span>
          </div>
          <div class="stat-item">
            <span class="label">RTP 오차</span>
            <span class="value" id="rtpDiff">0.0%</span>
          </div>
        </div>
        
        <div class="prob-container">
          <div class="prob-title">당첨 확률 정보</div>
          <div id="probList" class="prob-grid"></div>
        </div>
      </div>

      <div class="footer-btns">
        <button id="history-btn" class="toss-btn secondary">기록 보기</button>
      </div>
    </div>
  </div>

  <div id="historyModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">기록</div>
      <div class="history" id="history"></div>
      <button id="closeHistory" class="modal-close-btn toss-btn">닫기</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
