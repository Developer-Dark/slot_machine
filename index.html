<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>슬롯 시뮬레이터</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="win-overlay" class="win-overlay"></div>

  <div class="app">
    <header class="header">
      <h1>행운의 스핀</h1>
      <p>오늘의 잭팟을 노려보세요!</p>
    </header>

    <div class="card spin-card" id="main-card">
      <div class="slots">
        <div class="slot"><div class="reel" id="reel1"></div></div>
        <div class="slot"><div class="reel" id="reel2"></div></div>
        <div class="slot"><div class="reel" id="reel3"></div></div>
      </div>
      <button id="spin-btn" disabled>데이터 불러오는 중...</button>
    </div>

    <div class="info-section">
      <div class="card tiny-card">
        <span class="label">ID</span>
        <div class="id-row">
          <strong id="playerIdText"></strong>
          <button class="text-btn" id="copyBtn">복사</button>
        </div>
      </div>
      
      <div class="card tiny-card">
        <span class="label">남은 스핀</span>
        <strong><span id="spinCountText">-</span>회</strong>
      </div>
    </div>

    <div class="card stats-card">
      <div class="stats-header">
        <h3>RTP 통계</h3>
        <button class="text-btn" id="history-btn">기록 보기</button>
      </div>
      <div class="stats-grid">
        <div class="stat-item">목표 <span>92%</span></div>
        <div class="stat-item">실제 <span id="actualRtp">0%</span></div>
        <div class="stat-item">오차 <span id="rtpDiff">0%</span></div>
      </div>
    </div>
  </div>

  <div id="historyModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>당첨 기록</h2>
        <button id="closeHistory" class="close-btn">&times;</button>
      </div>
      <div class="history-list" id="history"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
