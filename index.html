<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>행운의 슬롯</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="win-overlay" class="win-overlay"></div>

  <div class="app">
    <header class="header">
      <h1>행운의 스핀</h1>
      <p>오늘의 운을 시험해보세요</p>
    </header>

    <div class="card main-card" id="main-card">
      <div id="result-text">준비되셨나요?</div>
      <div class="slots">
        <div class="slot"><div class="reel" id="reel1"></div></div>
        <div class="slot"><div class="reel" id="reel2"></div></div>
        <div class="slot"><div class="reel" id="reel3"></div></div>
      </div>
      <button id="spin-btn" disabled>데이터 불러오는 중...</button>
    </div>

    <div class="info-row">
      <div class="card half-card">
        <span class="label">ID</span>
        <div class="id-box">
          <span id="playerIdText"></span>
          <button id="copyBtn" class="text-btn">복사</button>
        </div>
      </div>
      <div class="card half-card">
        <span class="label">남은 기회</span>
        <strong id="spinCountText">0</strong>
      </div>
    </div>

    <div class="card stats-card">
      <div class="stats-top">
        <h3>RTP 통계</h3>
        <button id="history-btn" class="text-btn">기록 보기</button>
      </div>
      <div class="stats-box">
        <div class="stat"><span class="label">목표</span> 92%</div>
        <div class="stat"><span class="label">실제</span> <b id="actualRtp">0%</b></div>
        <div class="stat"><span class="label">오차</span> <b id="rtpDiff">0%</b></div>
      </div>
    </div>
  </div>

  <div id="historyModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>당첨 기록</h2>
        <button id="closeHistory" class="close-btn">&times;</button>
      </div>
      <div id="history" class="history-list"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
